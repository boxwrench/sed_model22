metadata:
  case_id: preview_three_baffle_high_energy
  title: Preview Three-Baffle High Energy
  description: Motion-first preview scenario with stronger visual pathing through a three-baffle layout.
  stage: v0.1

geometry:
  length_m: 100.0
  width_m: 30.0
  water_depth_m: 3.2

hydraulics:
  flow_rate_m3_s: 2.4
  temperature_c: 18.0

inlet:
  side: west
  center_m: 7.0
  span_m: 3.0

outlet:
  side: east
  center_m: 23.0
  span_m: 3.0

boundaries:
  wall_condition: impermeable
  baffle_condition: impermeable

bed:
  model: flat
  slope_x_m_per_m: 0.0
  slope_y_m_per_m: 0.0

baffles:
  - name: inlet_turn_baffle
    kind: full_depth_solid
    x1_m: 14.0
    y1_m: 0.0
    x2_m: 14.0
    y2_m: 23.0
  - name: center_turn_baffle
    kind: full_depth_solid
    x1_m: 42.0
    y1_m: 7.0
    x2_m: 42.0
    y2_m: 30.0
  - name: outlet_turn_baffle
    kind: full_depth_solid
    x1_m: 71.0
    y1_m: 0.0
    x2_m: 71.0
    y2_m: 22.0

numerics:
  nx: 96
  ny: 30
  solver_model: steady_screening_potential
  turbulence_model: constant_eddy_viscosity
  eddy_viscosity_m2_s: 0.001
  max_iterations: 3200
  tolerance: 0.000001
  relaxation_factor: 1.65

outputs:
  run_root: runs
  write_layout_svg: true
  write_velocity_svg: true
  write_fields_json: true
